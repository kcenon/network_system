name: Code Coverage

on:
  push:
    branches: [ main, develop, phase-* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Checkout common_system
      uses: actions/checkout@v6
      with:
        repository: kcenon/common_system
        path: common_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout thread_system
      uses: actions/checkout@v6
      with:
        repository: kcenon/thread_system
        path: thread_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout logger_system
      uses: actions/checkout@v6
      with:
        repository: kcenon/logger_system
        path: logger_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout container_system
      uses: actions/checkout@v6
      with:
        repository: kcenon/container_system
        path: container_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++ libgtest-dev libgmock-dev libasio-dev libfmt-dev libssl-dev liblz4-dev zlib1g-dev lcov

    - name: Build ecosystem dependencies
      shell: bash
      run: |
        # Build dependencies in tier order so each layer can find the previous one.
        # Matches the pattern used by ci.yml (sanitizer job) minus sanitizer-specific
        # compiler flags — coverage uses default gcc with --coverage.

        # common_system (Tier 0)
        if [ -d "common_system" ]; then
          echo "::group::Build common_system"
          cd common_system
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_SAMPLES=OFF
          cmake --build build
          cmake --install build --prefix ${{ github.workspace }}/deps/install
          cd ..
          echo "::endgroup::"
        fi

        # thread_system (Tier 1)
        if [ -d "thread_system" ]; then
          echo "::group::Build thread_system"
          cd thread_system
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/deps/install \
            -DCOMMON_SYSTEM_INCLUDE_DIR=${{ github.workspace }}/deps/install/include \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_SAMPLES=OFF \
            -DBUILD_INTEGRATION_TESTS=OFF
          cmake --build build --target thread_system
          cmake --install build --prefix ${{ github.workspace }}/deps/install
          cd ..
          echo "::endgroup::"
        fi

        # logger_system (Tier 2)
        if [ -d "logger_system" ]; then
          echo "::group::Build logger_system"
          cd logger_system
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/deps/install \
            -DCOMMON_SYSTEM_INCLUDE_DIR=${{ github.workspace }}/deps/install/include \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_SAMPLES=OFF \
            -DLOGGER_BUILD_INTEGRATION_TESTS=OFF
          cmake --build build
          cmake --install build --prefix ${{ github.workspace }}/deps/install
          cd ..
          echo "::endgroup::"
        fi

        # container_system (Tier 1)
        if [ -d "container_system" ]; then
          echo "::group::Build container_system"
          cd container_system
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/deps/install \
            -DCOMMON_SYSTEM_INCLUDE_DIR=${{ github.workspace }}/deps/install/include \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_SAMPLES=OFF
          cmake --build build
          # Install may fail due to missing files in container_system CMake config
          cmake --install build --prefix ${{ github.workspace }}/deps/install || true
          cd ..
          echo "::endgroup::"
        fi

    - name: Configure CMake with coverage
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/deps/install \
          -DENABLE_COVERAGE=ON \
          -DBUILD_WITH_COMMON_SYSTEM=ON \
          -DBUILD_WITH_LOGGER_SYSTEM=ON \
          -DBUILD_WITH_THREAD_SYSTEM=ON \
          -DBUILD_WITH_CONTAINER_SYSTEM=ON \
          -DBUILD_MESSAGING_BRIDGE=OFF \
          -DBUILD_TESTS=ON \
          -DBUILD_SAMPLES=OFF

    - name: Build with coverage
      run: cmake --build build --config Debug

    - name: Run tests
      run: |
        cd build
        ctest -C Debug --output-on-failure --verbose || true

    - name: Generate coverage report
      run: |
        cd build
        mkdir -p coverage

        # Capture coverage data (line + branch)
        lcov --directory . --capture --output-file coverage.info \
          --ignore-errors mismatch,gcov,source,unused \
          --rc geninfo_gcov_all_blocks=0 \
          --rc lcov_branch_coverage=1 || true

        # Filter out non-project sources
        lcov --remove coverage.info \
          '/usr/*' \
          '*/test/*' \
          '*/tests/*' \
          '*/examples/*' \
          '*/samples/*' \
          '*/build/_deps/*' \
          '*/googletest/*' \
          '*/asio/*' \
          '*/common_system/*' \
          '*/thread_system/*' \
          '*/logger_system/*' \
          '*/container_system/*' \
          '*/deps/*' \
          '*/fmt/*' \
          '*/openssl/*' \
          '*/lz4/*' \
          '*/zlib/*' \
          --output-file coverage_filtered.info \
          --ignore-errors unused,mismatch \
          --rc lcov_branch_coverage=1 || true

        # Generate HTML report (with branch coverage pages)
        genhtml coverage_filtered.info --output-directory coverage_html \
          --ignore-errors source,unmapped \
          --branch-coverage || true

        # Print summary (line + branch)
        lcov --list coverage_filtered.info \
          --ignore-errors unused \
          --rc lcov_branch_coverage=1 || true

    - name: Extract coverage percentage
      id: coverage
      run: |
        if [ -f build/coverage_filtered.info ]; then
          # Extract line and branch coverage percentages
          SUMMARY=$(lcov --summary build/coverage_filtered.info 2>&1 \
            --ignore-errors empty \
            --rc lcov_branch_coverage=1 || true)
          COVERAGE=$(echo "$SUMMARY" | grep -oP 'lines\.*:\s*\K[0-9.]+' || echo "0")
          BRANCH_COVERAGE=$(echo "$SUMMARY" | grep -oP 'branches\.*:\s*\K[0-9.]+' || echo "0")
          echo "percentage=${COVERAGE}" >> $GITHUB_OUTPUT
          echo "branch_percentage=${BRANCH_COVERAGE}" >> $GITHUB_OUTPUT
          echo "Line coverage: ${COVERAGE}%"
          echo "Branch coverage: ${BRANCH_COVERAGE}%"
        else
          echo "percentage=0" >> $GITHUB_OUTPUT
          echo "branch_percentage=0" >> $GITHUB_OUTPUT
          echo "No coverage data available"
        fi

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./build/coverage_filtered.info
        flags: unittests
        name: network_system-coverage
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v8
      continue-on-error: true
      with:
        script: |
          const coverage = '${{ steps.coverage.outputs.percentage }}';
          const branchCoverage = '${{ steps.coverage.outputs.branch_percentage }}';
          const body = `## Coverage Report

          | Metric | Value |
          |--------|-------|
          | **Line Coverage** | ${coverage}% |
          | **Branch Coverage** | ${branchCoverage}% |
          | **Target** | 80% lines / 70% branches |

          <details>
          <summary>Coverage Details</summary>

          Full HTML report is available as a build artifact.
          </details>`;

          // Find existing coverage comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existingComment = comments.find(c =>
            c.body.includes('## Coverage Report') && c.user.type === 'Bot'
          );

          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }

    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v7
      continue-on-error: true
      with:
        name: coverage-report
        path: |
          build/coverage.info
          build/coverage_filtered.info
          build/coverage_html/
        retention-days: 30

    - name: Coverage summary
      if: always()
      run: |
        COVERAGE="${{ steps.coverage.outputs.percentage }}"
        BRANCH_COVERAGE="${{ steps.coverage.outputs.branch_percentage }}"
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f build/coverage_filtered.info ] && [ "$COVERAGE" != "0" ]; then
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Line Coverage** | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch Coverage** | ${BRANCH_COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | 80% lines / 70% branches |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report uploaded as artifact (retained for 30 days)." >> $GITHUB_STEP_SUMMARY
        else
          echo "No coverage data generated." >> $GITHUB_STEP_SUMMARY
        fi
