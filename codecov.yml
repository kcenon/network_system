# Codecov Configuration for network_system
# Reference: https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    project:
      default:
        target: 40%  # Phase 2: Increased unit test coverage (Issue #873)
        threshold: 2%
    patch:
      default:
        target: auto  # Match existing coverage level for new code
        threshold: 5%

# Gradual improvement plan:
# - Phase 1: 21% project, auto patch - establish realistic baseline
# - Phase 2 (Current): 40% project, auto patch - improved unit test coverage (Issue #873)
# - Phase 3: 55% project, 70% patch - comprehensive coverage
# - Phase 4: 70% project, 80% patch - production-ready coverage
#
# Note: gRPC wrapper code depends on external gRPC library and is better tested
# via integration tests rather than unit tests

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "tests/**/*"
  - "integration_tests/**/*"
  - "samples/**/*"
  - "benchmarks/**/*"
  - "build/**/*"
  - "**/test_*.cpp"
  - "**/*_test.cpp"
  - "src/internal/**/*"  # Internal implementation headers - not part of public API
